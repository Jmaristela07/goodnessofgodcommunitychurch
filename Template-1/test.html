<!-- Form -->
    <form class="my-form" 
          action="mailto:goodnessofgodcommunitychurch@gmail.com" 
          method="post" 
          enctype="text/plain">
    <div class="form-row">
        <div class="field-group">
            <label for="full-name">Full Name</label>
            <input type="text" id="full-name" name="name" required>
        </div>
        
        <div class="field-group">
            <label for="user-email">Email Address</label>
            <input type="email" id="user-email" name="email" required>
        </div>
    </div>

    <div class="field-group">
        <label for="request-type">Type of Message</label>
        <select id="request-type" name="type">
            <option value="inquiry">General Inquiry</option>
            <option value="prayer">Prayer Request / Intercession</option>
            <option value="testimony">Share a Testimony</option>
            <option value="counseling">Pastoral Counseling</option>
        </select>
    </div>

    <div class="field-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
    </div>

    <button type="submit" class="submit-btn">SUBMIT</button>
  </form>
